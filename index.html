<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>皮克松赌场 — 小游戏合集</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="quote" class="quote-popup"></div>

  <!-- 大厅 -->
  <div class="hall active" id="hall">
    <header class="header">
      <h1>🃏 皮克松赌场</h1>
      <p class="subtitle">PI KE SONG · CASINO</p>
      <hr class="divider">
      <p class="tagline">"给我擦皮鞋，小瘪三！"</p>
    </header>
    <div class="top-bar">
      <div class="balance-display">💰 筹码：<span class="balance-val">0</span></div>
      <button class="sound-toggle" onclick="Engine.play('click')">🔊 音效</button>
    </div>
    <div class="games-grid" id="gameGrid"></div>
    <div class="footer-sig">这碗饭是您赏的，我皮克松心里有数。</div>
  </div>

  <!-- 游戏页面容器（由JS动态生成） -->
  <div id="gamePages"></div>

  <script src="js/engine.js"></script>
  <script src="js/games/dice.js"></script>
  <script src="js/games/blackjack.js"></script>
  <script src="js/games/cardcheck.js"></script>
  <script src="js/games/slot.js"></script>
  <script src="js/games/hilo.js"></script>
  <script src="js/games/roulette.js"></script>
  <script src="js/games/war.js"></script>
  <script src="js/games/russian.js"></script>
  <script src="js/games/coinflip.js"></script>
  <script src="js/games/scratch.js"></script>
  <script src="js/games/bomb.js"></script>
  <script src="js/games/luckywheel.js"></script>
  <script src="js/games/rps.js"></script>
</body>
</html>
